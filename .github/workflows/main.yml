name: Deploy

on:
  push:
    branches:
      - main

jobs:
  push_image:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::480535519801:role/github-actions-dev-story-scraper
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug ECR Repository Secret
        run: |
          echo "Repository length: $(echo -n "${{ secrets.ECR_REPOSITORY }}" | wc -m)"
          echo "Repository reversed: $(echo -n "${{ secrets.ECR_REPOSITORY }}" | rev)"
          echo "Account ID length: $(echo -n "${{ secrets.ECR_ACCOUNT_ID }}" | wc -m)"
          echo "Account ID reversed: $(echo -n "${{ secrets.ECR_ACCOUNT_ID }}" | rev)"
          echo "Region length: $(echo -n "${{ secrets.AWS_REGION }}" | wc -m)"
          echo "Region reversed: $(echo -n "${{ secrets.AWS_REGION }}" | rev)"

      - name: Install dependencies
        run: |
          yarn install
      - name: Run tests
        run: |
          yarn test
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:v1.${{ github.run_number }}
